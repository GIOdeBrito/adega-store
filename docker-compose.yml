services:
    app:
        container_name: adega-container-dev
        restart: always
        build:
            context: ./app
            dockerfile: Dockerfile
        environment:
            ENVIRONMENT: development
        volumes:
            - ./app/public:/usr/src/app/public
            - ./app/src:/usr/src/app/src
        ports:
            - "${APP_PORT}:8080"
        command: npm run dev
        networks:
            - adega-net
        tty: true
        profiles: [ "dev" ]

    backend-service-dev:
        container_name: adega-backend-dev
        restart: always
        build:
            context: ./backend
            dockerfile: Dockerfile
        environment:
            ENVIRONMENT: development
            POSTGRES_DB_NAME: ${DATABASE_NAME}
            POSTGRES_DB_LOGIN: ${DATABASE_LOGIN}
            POSTGRES_DB_PASSWD: ${DATABASE_PASSWD}
        volumes:
            - ./backend/src:/usr/src/app/src
        ports:
            - "${SERVER_PORT}:8080"
        depends_on:
            - database-dev
        command: npm run dev
        networks:
            - adega-net
        tty: true
        profiles: [ "dev" ]

    webpack-bundler-dev:
        container_name: webpack-bundler-dev
        build:
            context: ./webpack-bundler
            dockerfile: Dockerfile
        volumes:
            - ./app/private/sourcejs:/app/sourcejs
            - ./app/public/src:/app/outdir
        working_dir: /app
        command: npm run dev
        profiles: [ "dev" ]

    database-dev:
        container_name: postgres-db-container-dev
        build:
            context: ./postgres-db
            dockerfile: Dockerfile
        environment:
            POSTGRES_USER: ${DATABASE_LOGIN}
            POSTGRES_PASSWORD: ${DATABASE_PASSWD}
            POSTGRES_DB: ${DATABASE_NAME}
        ports:
            - "${DATABASE_PORT}:5432"
        networks:
            - adega-net
        tty: true
        profiles: [ "dev" ]

networks:
    adega-net:
        name: adega-network
        external: false